name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger — used to unblock CI when the push-trigger
  # scheduler is failing for a repo (2026-05-26: account-wide bug
  # where pushes generate zero check-suites; `has_actions: null`
  # via REST). Allows `gh workflow run test.yml --ref <branch>` to
  # run tests on any ref regardless of push-trigger state.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # setup-uv v8 doesn't maintain a moving v8 tag — pin to the
        # latest patch. Bump manually when needed.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"

      - name: Install deps
        run: uv sync --all-extras

      - name: ruff
        run: uv run ruff check .

      - name: pytest
        run: uv run pytest
