name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"

      - name: Install deps
        run: uv sync --all-extras

      - name: ruff
        run: uv run ruff check .

      - name: pytest
        run: uv run pytest
