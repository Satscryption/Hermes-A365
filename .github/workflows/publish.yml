name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  # Manual trigger — backup for when push-tag trigger is unavailable
  # (e.g. account-wide Actions scheduler bug 2026-05-26). Allows
  # `gh workflow run publish.yml --ref v0.x.y` to publish a tag
  # that didn't auto-fire publish.yml on tag push. NOTE: PyPI
  # Trusted Publisher (OIDC) may need a separate trust entry for
  # `workflow_dispatch` events; verify with a test publish to
  # TestPyPI first if relying on this path.
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Uses PyPI Trusted Publisher (OIDC) — no PYPI_API_TOKEN secret.
    # One-time setup: register the project on pypi.org and add this
    # repo + workflow as a Trusted Publisher under "Manage > Publishing".
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Sanity-check artefacts
        run: |
          ls -la dist/
          python -c "import zipfile, glob; w = glob.glob('dist/*.whl')[0]; names = zipfile.ZipFile(w).namelist(); print('\n'.join(names))" \
            | grep -E "(plugin\.yaml|_data/templates/.+\.j2)" \
            && echo "Package data present ✓" \
            || (echo "Missing package data in wheel!" && exit 1)

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
